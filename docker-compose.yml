version: "3.8"

services:
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: docker-sandbox-selenium
    shm_size: 2gb
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - SE_VNC_NO_PASSWORD=1
      - SE_SCREEN_WIDTH=1800
      - SE_SCREEN_HEIGHT=960
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    ports:
      - "4444:4444"
      - "7900:7900"

  tests:
    build:
      context: .
    container_name: docker-sandbox-tests
    environment:
      - SELENIUM_REMOTE_URL=http://selenium:4444/wd/hub
    depends_on:
      - selenium
